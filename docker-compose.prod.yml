version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transitops_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops_backend_prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/transitops?schema=public
      - JWT_SECRET=transitops_super_secret_production_key_2026
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_SECRET=transitops_super_secret_production_refresh_key_2026
      - JWT_REFRESH_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transitops_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  transitops_data:
