version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fleetpilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleetpilot
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fleetpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
